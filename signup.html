<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieSpace — Sign Up</title>
  <style>
    :root {
      --orange: #FFA500;
      --orange-dark: #e69400;
      --bg: #000000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--orange);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .nav-logo-text {
      color: var(--orange);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--orange); }

    .btn-nav {
      background: var(--orange);
      color: black;
      border: none;
      border-radius: 9999px;
      padding: 0.45rem 1.3rem;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-nav:hover { background: var(--orange-dark); }

    /* ── Form wrapper ── */
    .signup-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 61px);
      padding: 2rem 1rem;
    }

    .signup-card {
      width: 100%;
      max-width: 380px;
    }

    /* Logo */
    .form-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.8rem;
    }

    .form-logo-text {
      color: var(--orange);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Field group */
    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-label {
      display: block;
      color: #ccc;
      font-size: 0.9rem;
      font-weight: 400;
      margin-bottom: 0.45rem;
    }

    .form-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      color: white;
      font-size: 0.95rem;
      padding: 0.35rem 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-bottom-color: var(--orange);
    }

    /* Inline error */
    .field-error {
      display: none;
      margin-top: 0.4rem;
      font-size: 0.8rem;
      color: var(--orange);
    }

    .field-error.visible {
      display: block;
    }

    /* Submit button */
    .btn-signup {
      display: block;
      margin: 0.4rem auto 0;
      background: var(--orange);
      color: black;
      border: none;
      border-radius: 9999px;
      padding: 0.65rem 2.8rem;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-signup:hover { background: var(--orange-dark); }

    /* Login link */
    .login-text {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .login-text a {
      color: var(--orange);
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .login-text a:hover { opacity: 0.75; }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      </svg>
      <span class="nav-logo-text">MovieSpace</span>
    </a>
    <div class="nav-right">
      <a href="#" class="nav-link">All Films</a>
      <a href="index.html" class="btn-nav">Login</a>
    </div>
  </div>
</nav>

<!-- ── Signup Form ── -->
<div class="signup-wrapper">
  <div class="signup-card">

    <!-- Logo -->
    <div class="form-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4C13.3132 4 14.6136 4.25866 15.8268 4.7612C17.0401 5.26375 18.1425 6.0003 19.0711 6.9289C19.9997 7.8575 20.7362 8.9599 21.2388 10.1732C21.7413 11.3864 22 12.6868 22 14C22 16.6522 20.9464 19.1957 19.0711 21.0711C17.1957 22.9464 14.6522 24 12 24C10.6868 24 9.38642 23.7413 8.17317 23.2388C6.95991 22.7362 5.85752 21.9997 4.92893 21.0711C3.05357 19.1957 2 16.6522 2 14C2 11.3478 3.05357 8.8043 4.92893 6.9289C6.8043 5.05357 9.34784 4 12 4ZM12 6C11.337 6 10.7011 6.2634 10.2322 6.7322C9.76339 7.2011 9.5 7.837 9.5 8.5C9.5 9.163 9.76339 9.7989 10.2322 10.2678C10.7011 10.7366 11.337 11 12 11C12.663 11 13.2989 10.7366 13.7678 10.2678C14.2366 9.7989 14.5 9.163 14.5 8.5C14.5 7.837 14.2366 7.2011 13.7678 6.7322C13.2989 6.2634 12.663 6 12 6ZM4.4 11.53C4.19 12.16 4.248 12.845 4.548 13.436C4.848 14.027 5.37 14.474 6 14.68C7.32 15.1 8.73 14.39 9.15 13.07C9.355 12.44 9.302 11.755 9.002 11.164C8.702 10.573 8.18 10.126 7.55 9.92C6.24 9.5 4.82 10.21 4.4 11.53ZM19.61 11.5C19.18 10.21 17.77 9.5 16.46 9.92C16.146 10.02 15.856 10.18 15.605 10.393C15.354 10.606 15.148 10.866 14.998 11.159C14.848 11.452 14.758 11.772 14.733 12.1C14.707 12.428 14.747 12.758 14.85 13.07C15.056 13.7 15.503 14.222 16.094 14.522C16.685 14.822 17.37 14.875 18 14.67C19.31 14.25 20.03 12.83 19.61 11.5ZM7.31 20.46C8.42 21.28 10 21.03 10.8 19.91C11.61 18.79 11.36 17.23 10.24 16.42C9.704 16.032 9.035 15.872 8.382 15.975C7.728 16.078 7.141 16.436 6.75 16.97C5.94 18.09 6.19 19.65 7.31 20.46ZM16.7 20.46C17.82 19.65 18.07 18.09 17.26 16.97C17.068 16.704 16.825 16.478 16.545 16.306C16.265 16.134 15.954 16.019 15.63 15.968C15.305 15.917 14.974 15.931 14.655 16.008C14.335 16.086 14.035 16.226 13.77 16.42C13.504 16.612 13.278 16.855 13.106 17.135C12.934 17.414 12.818 17.725 12.766 18.049C12.714 18.373 12.727 18.704 12.803 19.024C12.879 19.343 13.017 19.644 13.21 19.91C14 21.03 15.59 21.27 16.7 20.46ZM12 12.5C11.6022 12.5 11.2206 12.658 10.9393 12.9393C10.658 13.2206 10.5 13.6022 10.5 14C10.5 14.3978 10.658 14.       </svg>
      <span class="form-logo-text">MovieSpace</span>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input id="email" class="form-input" type="email" name="email" autocomplete="email" required />
      <div class="field-error" id="email-error">User already exists!</div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input id="password" class="form-input" type="password" name="password" autocomplete="new-password" required />
      <div class="field-error" id="password-error">Password must be at least 6 characters.</div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label class="form-label" for="confirm">Confirm Password</label>
      <input id="confirm" class="form-input" type="password" name="confirm" autocomplete="new-password" required />
      <div class="field-error" id="confirm-error">Passwords do not match!</div>
    </div>

    <button class="btn-signup" type="button" onclick="handleSignup()">Signup</button>

    <p class="login-text">
      Registered user? <a href="index.html">Login Here</a>
    </p>

  </div>
</div>

<script>
  // Dummy registered emails for demo
  const registeredEmails = ['test@example.com', 'user@moviespace.com'];

  function clearErrors() {
    document.getElementById('email-error').classList.remove('visible');
    document.getElementById('password-error').classList.remove('visible');
    document.getElementById('confirm-error').classList.remove('visible');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    if (msg) el.textContent = msg;
    el.classList.add('visible');
  }

  function handleSignup() {
    clearErrors();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    let hasError   = false;

    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      showError('email-error', 'Please enter a valid email.'); hasError = true;
    } else if (registeredEmails.includes(email.toLowerCase())) {
      showError('email-error', 'User already exists!'); hasError = true;
    }

    if (password.length < 6) {
      showError('password-error', 'Password must be at least 6 characters.'); hasError = true;
    }

    if (!confirm || confirm !== password) {
      showError('confirm-error', 'Passwords do not match!'); hasError = true;
    }

    if (!hasError) {
      alert('Account created! Welcome to MovieSpace 🎬');
    }
  }
</script>

</body>
</html>
