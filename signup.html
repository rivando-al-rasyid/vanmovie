<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace — Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.ico" type="image/x-icon" />
    <script type="module" src="./src/js/auth.js"></script>
    <script type="module" src="./src/js/signup.js"></script>
  </head>
  <body class="min-h-screen">

    <!-- Signup form -->
    <main class="min-h-screen flex items-center justify-center pt-14 px-4">
      <article class="theme-card w-full max-w-sm p-8 shadow-xl">
        <header class="flex items-center gap-2 justify-center mb-8">
          <img src="./src/asset/icon.svg" alt="Icon">
          <h1 class="font-semibold text-lg m-0">MovieSpace</h1>
        </header>

        <form id="signup-form" novalidate>
          <div class="mb-4">
            <label class="block text-xs mb-1.5 font-medium" for="email">Email</label>
            <input id="email" class="form-input" type="email" name="email" autocomplete="email" required />
            <p class="field-error hidden text-xs mt-1" id="email-error"></p>
          </div>
          <div class="mb-4">
            <label class="block text-xs mb-1.5 font-medium" for="password">Password</label>
            <input id="password" class="form-input" type="password" name="password" autocomplete="new-password" required />
            <p class="field-error hidden text-xs mt-1" id="password-error"></p>
          </div>
          <div class="mb-6">
            <label class="block text-xs mb-1.5 font-medium" for="confirm">Confirm Password</label>
            <input id="confirm" class="form-input" type="password" name="confirm" autocomplete="new-password" required />
            <p class="field-error hidden text-xs mt-1" id="confirm-error"></p>
          </div>
          <button class="btn-primary w-full py-2.5 text-sm" type="submit">Sign Up</button>
        </form>

        <p class="text-center text-xs mt-5">
          Already have an account? <a href="index.html" class="no-underline">Login Here</a>
        </p>
      </article>
    </main>

  </body>
</html>
