<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace — My List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.ico" type="image/x-icon" />
  </head>
  <body class="min-h-screen">

    <!-- Navbar -->
    <header class="navbar fixed top-0 left-0 right-0 z-50 backdrop-blur">
      <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 font-semibold no-underline">
          <img src="./src/asset/icon.svg" alt="Icon">
          <span>MovieSpace</span>
        </a>
        <ul class="flex items-center gap-4 list-none m-0 p-0">
          <li><a href="films.html"  class="nav-link text-sm no-underline">All Films</a></li>
          <li><a href="mylist.html" class="nav-link active text-sm no-underline">My Watchlists</a></li>
          <li><a href="index.html"  class="btn-nav text-sm no-underline">Login</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main -->
    <main class="max-w-6xl mx-auto px-6 pt-20 pb-16">
      <h1 class="text-xl font-bold mb-6">
        My List <span id="list-count" class="font-normal text-base"></span>
      </h1>

      <!-- Empty state -->
      <div id="empty-state" class="hidden py-20 flex-col items-center justify-center gap-4 text-center">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/>
        </svg>
        <p class="text-base m-0">Your list is empty</p>
        <p class="text-sm m-0">
          Add films from <a href="films.html" class="no-underline">All Films</a> to see them here
        </p>
      </div>

      <!-- Film list -->
      <ol id="mylist-films" class="flex flex-col gap-4 list-none m-0 p-0"></ol>
    </main>

    <script type="module" src="./src/js/mylist.js"></script>
  </body>
</html>
