<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.svg" type="image/x-icon" />
    <script type="module" src="./src/js/auth.js"></script>
    <script type="module" src="./src/js/login.js"></script>

  </head>
  <body class="min-h-screen">
    <!-- Login form -->
    <main class="min-h-screen flex items-center justify-center pt-14 px-4">
      <article class="theme-card w-full max-w-sm p-8 shadow-xl">
        <header class="flex items-center gap-2 justify-center mb-8">
          <img src="./src/asset/icon.svg" alt="Icon">
          <h1 class="font-semibold text-lg m-0">MovieSpace</h1>
        </header>

        <div class="login-form" novalidate>
          <div class="mb-5">
            <label class="block text-xs mb-1.5 font-medium" for="login-email">Email</label>
            <input id="login-email" class="form-input" type="email" name="email" autocomplete="email" required />
            <p class="field-error hidden text-xs mt-1" id="login-email-error"></p>
          </div>
          <div class="mb-4">
            <label class="block text-xs mb-1.5 font-medium" for="login-password">Password</label>
            <div class="relative">
              <input id="login-password" class="form-input" type="password" name="password" autocomplete="current-password" required />
            </div>
            <p class="field-error hidden text-xs mt-1" id="login-password-error"></p>
          </div>
          <div class="flex items-center gap-2 mb-5 text-xs">
            <input id="remember-me" type="checkbox" class="cursor-pointer" />
            <label for="remember-me" class="cursor-pointer">Remember me</label>
          </div>
          <p class="field-error hidden text-xs mb-3" id="login-general-error"></p>
          <button type="button" class="btn-login btn-primary w-full py-2.5 text-sm rounded-full">Sign In</button>
        </div>

        <p class="text-center text-xs mt-5">
          New user? <a href="signup.html" class="no-underline">Register Here</a>
        </p>
      </article>
    </main>

  </body>
</html>
