<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.ico" type="image/x-icon" />
  </head>
  <body class="min-h-screen">

    <!-- Navbar -->
    <header class="navbar fixed top-0 left-0 right-0 z-50 backdrop-blur">
      <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="#" class="flex items-center gap-2 font-semibold no-underline">
          <img src="./src/asset/icon.svg" alt="Icon">
          <span>MovieSpace</span>
        </a>
        <ul class="flex items-center gap-4 list-none m-0 p-0">
          <li><a href="./films.html" class="nav-link text-sm no-underline">All Films</a></li>
          <li><a href="index.html" class="btn-nav text-sm no-underline">Login</a></li>
        </ul>
      </nav>
    </header>

    <!-- Login form -->
    <main class="min-h-screen flex items-center justify-center pt-14 px-4">
      <article class="theme-card w-full max-w-sm p-8 shadow-xl">
        <header class="flex items-center gap-2 justify-center mb-8">
          <img src="./src/asset/icon.svg" alt="Icon">
          <h1 class="font-semibold text-lg m-0">MovieSpace</h1>
        </header>

        <div id="login-form" novalidate>
          <div class="mb-5">
            <label class="block text-xs mb-1.5 font-medium" for="login-email">Email</label>
            <input id="login-email" class="form-input" type="email" name="email" autocomplete="email" required />
            <p class="field-error hidden text-xs mt-1" id="login-email-error"></p>
          </div>
          <div class="mb-4">
            <label class="block text-xs mb-1.5 font-medium" for="login-password">Password</label>
            <div class="relative">
              <input id="login-password" class="form-input pr-10" type="password" name="password" autocomplete="current-password" required />
              <button id="toggle-password" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-base">👁</button>
            </div>
            <p class="field-error hidden text-xs mt-1" id="login-password-error"></p>
          </div>
          <div class="flex items-center gap-2 mb-5 text-xs">
            <input id="remember-me" type="checkbox" class="cursor-pointer" />
            <label for="remember-me" class="cursor-pointer">Remember me</label>
          </div>
          <p class="field-error hidden text-xs mb-3" id="login-general-error"></p>
          <button class="btn-login btn-primary w-full py-2.5 text-sm rounded-full">Sign In</button>
        </div>

        <p class="text-center text-xs mt-5">
          New user? <a href="signup.html" class="no-underline">Register Here</a>
        </p>
      </article>
    </main>

    <script type="module" src="./src/js/login.js"></script>
  </body>
</html>
