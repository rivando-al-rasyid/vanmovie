<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace — All Films</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.ico" type="image/x-icon" />
  </head>
  <body class="min-h-screen">

    <!-- Navbar -->
    <header class="navbar fixed top-0 left-0 right-0 z-50 backdrop-blur">
      <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 font-semibold no-underline">
          <img src="./src/asset/icon.svg" alt="Icon">
          <span>MovieSpace</span>
        </a>
        <ul class="flex items-center gap-4 list-none m-0 p-0">
          <li><a href="films.html"  class="nav-link active text-sm no-underline">All Films</a></li>
          <li><a href="mylist.html" class="nav-link text-sm no-underline">My Watchlists</a></li>
          <li><a href="index.html"  class="btn-nav text-sm no-underline">Login</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main Film List -->
    <main class="max-w-6xl mx-auto px-6 pt-20 pb-12" id="main-container">
      <h1 class="text-xl font-bold mb-5" id="page-title">All Films</h1>

      <!-- Filters -->
      <section>
        <div class="flex flex-wrap items-center gap-3 mb-6">

          <!-- Genre filter -->
          <div class="relative">
            <button
              id="genre-btn"
              class="filter-btn flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-semibold transition-colors cursor-pointer"
            >
              GENRE
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M6 9l6 6 6-6"/>
              </svg>
            </button>
            <ul
              id="genre-menu"
              class="dropdown-menu hidden absolute top-full left-0 mt-1 min-w-40 rounded-lg shadow-xl z-20 py-1 max-h-60 overflow-y-auto list-none m-0 p-0"
            >
              <li class="dropdown-item px-4 py-2 text-sm cursor-pointer" data-genre-id="0">All Genres</li>
            </ul>
          </div>

          <!-- Sort button -->
          <button
            id="sort-btn"
            class="filter-btn flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-semibold transition-colors cursor-pointer"
          >
            SORT BY IMDB
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Film list -->
      <section>
        <ol class="flex flex-col gap-4 list-none m-0 p-0" id="film-list"></ol>
      </section>

      <!-- Pagination -->
      <nav class="flex items-center justify-end gap-4 mt-6 pt-4 divider border-t">
        <div class="text-sm flex items-center gap-1.5 shrink-0">
          <span id="per-page">items per page: 10</span>
        </div>
        <p id="pagination-info" class="text-sm tabular-nums"></p>
        <div class="flex items-center gap-3" id="page-btns"></div>
      </nav>
    </main>

    <script type="module" src="./src/js/movies.js"></script>
  </body>
</html>
