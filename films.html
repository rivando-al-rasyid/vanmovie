<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieSpace — All Films</title>
  <style>
    :root {
      --orange: #FFA500;
      --orange-dark: #e69400;
      --bg: #000000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* Navbar */
    nav { background: var(--bg); border-bottom: 1px solid var(--orange); position: sticky; top: 0; z-index: 50; }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .nav-logo-text { color: var(--orange); font-size: 1rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .nav-right { display: flex; align-items: center; gap: 1.8rem; }
    .nav-link { color: white; text-decoration: none; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--orange); }
    .btn-nav { background: var(--orange); color: black; border: none; border-radius: 9999px; padding: 0.45rem 1.3rem; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-nav:hover { background: var(--orange-dark); }


    /* Main container */
    .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 1.4rem; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 0.8rem; margin-bottom: 2rem; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.35); border-radius: 9999px; padding: 0.4rem 1rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; transition: border-color 0.2s, color 0.2s; }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
    .filter-btn.active-filter { border-color: var(--orange); color: var(--orange); }
    .dropdown-wrapper { position: relative; }
    .dropdown-menu { display: none; position: absolute; top: calc(100% + 6px); left: 0; background: #111; border: 1px solid rgba(255,165,0,0.3); border-radius: 8px; min-width: 160px; padding: 0.4rem 0; z-index: 20; max-height: 260px; overflow-y: auto; }
    .dropdown-menu.open { display: block; }
    .dropdown-item { padding: 0.5rem 1rem; font-size: 0.78rem; color: #ccc; cursor: pointer; transition: color 0.15s, background 0.15s; }
    .dropdown-item:hover { color: var(--orange); background: rgba(255,165,0,0.06); }
    .filter-right { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    .search-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: white; font-size: 0.82rem; padding: 0.35rem 0.2rem; outline: none; width: 180px; transition: border-color 0.2s; }
    .search-input:focus { border-bottom-color: var(--orange); }
    .search-input::placeholder { color: rgba(255,255,255,0.3); font-size: 0.78rem; }

    /* Film list */
    .film-list { display: flex; flex-direction: column; }
    .film-item { display: flex; gap: 1.4rem; padding: 1.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .film-item:last-child { border-bottom: none; }
    .film-poster { flex-shrink: 0; width: 120px; height: 172px; object-fit: cover; border-radius: 4px; background: #1a1a1a; }
    .film-info { flex: 1; display: flex; flex-direction: column; gap: 0.45rem; padding-top: 0.1rem; }
    .film-title { font-size: 1.1rem; font-weight: 700; }
    .film-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag { border: 1px solid rgba(255,255,255,0.3); border-radius: 9999px; padding: 0.18rem 0.65rem; font-size: 0.7rem; color: #ccc; }
    .imdb-row { display: flex; align-items: center; gap: 0.4rem; }
    .imdb-badge { background: var(--orange); color: black; font-size: 0.65rem; font-weight: 800; padding: 0.12rem 0.35rem; border-radius: 3px; }
    .imdb-score { font-size: 0.82rem; color: #ccc; display: flex; align-items: center; gap: 0.2rem; }
    .star { color: var(--orange); }
    .film-year { font-size: 0.75rem; color: #666; }
    .film-desc { font-size: 0.82rem; color: #aaa; line-height: 1.55; max-width: 680px; }
    .film-actions { display: flex; gap: 0.7rem; margin-top: 0.3rem; flex-wrap: wrap; }
    .btn-view { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 9999px; padding: 0.42rem 1.1rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, color 0.2s; text-decoration: none; }
    .btn-view:hover { border-color: var(--orange); color: var(--orange); }
    .btn-watchlist { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 9999px; padding: 0.42rem 1.1rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-watchlist:hover { border-color: var(--orange); color: var(--orange); }

    /* Skeleton loader */
    .skeleton-item { display: flex; gap: 1.4rem; padding: 1.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .skeleton-poster { flex-shrink: 0; width: 120px; height: 172px; border-radius: 4px; background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    .skeleton-info { flex: 1; display: flex; flex-direction: column; gap: 0.7rem; padding-top: 0.3rem; }
    .skeleton-line { height: 14px; border-radius: 4px; background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: flex-end; gap: 1rem; margin-top: 2.5rem; font-size: 0.78rem; color: #aaa; }
    .items-per-page { display: flex; align-items: center; gap: 0.5rem; }
    .items-per-page select { background: #111; border: 1px solid rgba(255,255,255,0.2); color: #ccc; border-radius: 4px; padding: 0.2rem 0.4rem; font-size: 0.75rem; cursor: pointer; outline: none; }
    .page-btns { display: flex; align-items: center; gap: 0.3rem; }
    .page-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #ccc; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; transition: border-color 0.2s, color 0.2s; }
    .page-btn:hover, .page-btn.active { border-color: var(--orange); color: var(--orange); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* No results */
    .no-results { text-align: center; padding: 4rem 0; color: #555; font-size: 0.9rem; }

    /* TMDB attribution */
    .tmdb-credit { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; font-size: 0.72rem; color: #555; }
    .tmdb-credit img { height: 16px; opacity: 0.5; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4C13.3132 4 14.6136 4.25866 15.8268 4.7612C17.0401 5.26375 18.1425 6.0003 19.0711 6.9289C19.9997 7.8575 20.7362 8.9599 21.2388 10.1732C21.7413 11.3864 22 12.6868 22 14C22 16.6522 20.9464 19.1957 19.0711 21.0711C17.1957 22.9464 14.6522 24 12 24C10.6868 24 9.38642 23.7413 8.17317 23.2388C6.95991 22.7362 5.85752 21.9997 4.92893 21.0711C3.05357 19.1957 2 16.6522 2 14C2 11.3478 3.05357 8.8043 4.92893 6.9289C6.8043 5.05357 9.34784 4 12 4ZM12 6C11.337 6 10.7011 6.2634 10.2322 6.7322C9.76339 7.2011 9.5 7.837 9.5 8.5C9.5 9.163 9.76339 9.7989 10.2322 10.2678C10.7011 10.7366 11.337 11 12 11C12.663 11 13.2989 10.7366 13.7678 10.2678C14.2366 9.7989 14.5 9.163 14.5 8.5C14.5 7.837 14.2366 7.2011 13.7678 6.7322C13.2989 6.2634 12.663 6 12 6ZM4.4 11.53C4.19 12.16 4.248 12.845 4.548 13.436C4.848 14.027 5.37 14.474 6 14.68C7.32 15.1 8.73 14.39 9.15 13.07C9.355 12.44 9.302 11.755 9.002 11.164C8.702 10.573 8.18 10.126 7.55 9.92C6.24 9.5 4.82 10.21 4.4 11.53ZM19.61 11.5C19.18 10.21 17.77 9.5 16.46 9.92C16.146 10.02 15.856 10.18 15.605 10.393C15.354 10.606 15.148 10.866 14.998 11.159C14.848 11.452 14.758 11.772 14.733 12.1C14.707 12.428 14.747 12.758 14.85 13.07C15.056 13.7 15.503 14.222 16.094 14.522C16.685 14.822 17.37 14.875 18 14.67C19.31 14.25 20.03 12.83 19.61 11.5ZM7.31 20.46C8.42 21.28 10 21.03 10.8 19.91C11.61 18.79 11.36 17.23 10.24 16.42C9.704 16.032 9.035 15.872 8.382 15.975C7.728 16.078 7.141 16.436 6.75 16.97C5.94 18.09 6.19 19.65 7.31 20.46ZM16.7 20.46C17.82 19.65 18.07 18.09 17.26 16.97C17.068 16.704 16.825 16.478 16.545 16.306C16.265 16.134 15.954 16.019 15.63 15.968C15.305 15.917 14.974 15.931 14.655 16.008C14.335 16.086 14.035 16.226 13.77 16.42C13.504 16.612 13.278 16.855 13.106 17.135C12.934 17.414 12.818 17.725 12.766 18.049C12.714 18.373 12.727 18.704 12.803 19.024C12.879 19.343 13.017 19.644 13.21 19.91C14 21.03 15.59 21.27 16.7 20.46ZM12 12.5C11.6022 12.5 11.2206 12.658 10.9393 12.9393C10.658 13.2206 10.5 13.6022 10.5 14C10.5 14.3978 10.658 14.7794 10.9393 15.0607C11.2206 15.342 11.6022 15.5 12 15.5C12.3978 15.5 12.7794 15.342 13.0607 15.0607C13.342 14.7794 13.5 14.3978 13.5 14C13.5 13.6022 13.342 13.2206 13.0607 12.9393C12.7794 12.658 12.3978 12.5 12 12.5Z" fill="#FFA500"/></svg>
      <span class="nav-logo-text">MovieSpace</span>
    </a>
    <div class="nav-right">
      <a href="#" class="nav-link active">All Films</a>
      <a href="#" class="nav-link">My Watchlists</a>
      <a href="index.html" class="btn-nav">Login</a>
    </div>
  </div>
</nav>


<!-- Main Film List -->
<div class="container" id="main-container">
  <h1 class="page-title" id="page-title">All Films</h1>

  <div class="filter-bar">
    <div class="dropdown-wrapper">
      <button class="filter-btn" id="genre-btn" onclick="toggleGenre()">
        GENRE
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="dropdown-menu" id="genre-menu">
        <div class="dropdown-item" onclick="filterGenre(0,'All')">All Genres</div>
      </div>
    </div>

    <button class="filter-btn" id="sort-btn" onclick="toggleSort()">
      SORT BY IMDB
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
    </button>

    <div class="filter-right">
      <input class="search-input" id="search-input" type="text" placeholder="Cari film..." oninput="onSearch()" />
    </div>
  </div>

  <div class="film-list" id="film-list"></div>

  <div class="tmdb-credit">
    <span>Data provided by</span>
    <img src="https://www.themoviedb.org/assets/2/v4/logos/v2/blue_short-8e7b30f73a4020692ccca9c88bafe5dcb6f8a62a4c6bc55cd9ba82bb2cd95f6c.svg" alt="TMDB" style="height:16px;filter:brightness(0.6)">
    <span>This product uses the TMDB API but is not endorsed or certified by TMDB.</span>
  </div>

  <div class="pagination">
    <div class="items-per-page">
      Items per page:
      <select id="per-page" onchange="onPerPageChange()">
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50" selected>50</option>
      </select>
    </div>
    <span id="pagination-info"></span>
    <div class="page-btns" id="page-btns"></div>
  </div>
</div>

<script>
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p/w300';
const API_KEY = 'ec38e725ce7ea0d047987183a7fb6597';

let allFilms = [];
let filteredFilms = [];
let genres = {};
let activeGenreId = 0;
let sortDesc = true;
let currentPage = 1;
let perPage = 50;
let searchQuery = '';
let searchTimer = null;
let totalTMDBPages = 1;
let currentTMDBPage = 1;

// Auto-init on load
(async () => {
  try {
    const genreRes = await tmdbFetch('/genre/movie/list');
    genreRes.genres.forEach(g => genres[g.id] = g.name);
    buildGenreMenu(genreRes.genres);
    document.getElementById('main-container').style.display = 'block';
    await loadFilms();
  } catch (e) {
    document.getElementById('film-list').innerHTML = '<div class="no-results">Gagal memuat data dari TMDB.</div>';
  }
})();

async function tmdbFetch(path, params = {}) {
  const url = new URL(BASE_URL + path);
  url.searchParams.set('api_key', API_KEY);
  url.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

async function loadFilms() {
  showSkeleton();
  try {
    let data;
    if (searchQuery.trim()) {
      data = await tmdbFetch('/search/movie', { query: searchQuery, page: currentTMDBPage });
    } else if (activeGenreId) {
      data = await tmdbFetch('/discover/movie', {
        with_genres: activeGenreId,
        sort_by: sortDesc ? 'vote_average.desc' : 'vote_average.asc',
        'vote_count.gte': 200,
        page: currentTMDBPage
      });
    } else {
      data = await tmdbFetch('/discover/movie', {
        sort_by: sortDesc ? 'vote_average.desc' : 'vote_average.asc',
        'vote_count.gte': 500,
        page: currentTMDBPage
      });
    }

    totalTMDBPages = Math.min(data.total_pages || 1, 250);
    allFilms = data.results || [];
    filteredFilms = allFilms;

    renderFilms();
    renderPagination(data.total_results || 0);
  } catch (e) {
    document.getElementById('film-list').innerHTML = '<div class="no-results">Gagal memuat data. Coba refresh halaman.</div>';
  }
}

function buildGenreMenu(list) {
  const menu = document.getElementById('genre-menu');
  menu.innerHTML = '<div class="dropdown-item" onclick="filterGenre(0,\'All Genres\')">All Genres</div>';
  list.forEach(g => {
    const el = document.createElement('div');
    el.className = 'dropdown-item';
    el.textContent = g.name;
    el.onclick = () => filterGenre(g.id, g.name);
    menu.appendChild(el);
  });
}

function renderFilms() {
  const list = document.getElementById('film-list');
  if (!filteredFilms.length) {
    list.innerHTML = '<div class="no-results">Tidak ada film ditemukan.</div>';
    document.getElementById('page-title').textContent = 'All Films (0)';
    return;
  }

  const start = (currentPage - 1) * perPage;
  const pageFilms = filteredFilms.slice(start, start + perPage);

  list.innerHTML = pageFilms.map(film => {
    const poster = film.poster_path ? IMG_BASE + film.poster_path : '';
    const rating = film.vote_average ? film.vote_average.toFixed(1) : 'N/A';
    const year = film.release_date ? film.release_date.split('-')[0] : '';
    const filmGenres = (film.genre_ids || []).map(id => genres[id]).filter(Boolean);
    const desc = film.overview || 'No description available.';
    const truncDesc = desc.length > 200 ? desc.slice(0, 200) + '...' : desc;

    return `
      <div class="film-item">
        ${poster
          ? `<img class="film-poster" src="${poster}" alt="${escHtml(film.title)}" loading="lazy" onerror="this.style.background='#1a1a1a';this.src=''">`
          : `<div class="film-poster" style="display:flex;align-items:center;justify-content:center;color:#333;font-size:0.7rem;text-align:center;padding:0.5rem;">No Poster</div>`
        }
        <div class="film-info">
          <div class="film-title">${escHtml(film.title)} <span class="film-year">${year}</span></div>
          <div class="film-tags">${filmGenres.map(g => `<span class="tag">${g}</span>`).join('')}</div>
          <div class="imdb-row">
            <span class="imdb-badge">TMDB</span>
            <span class="imdb-score">${rating} <span class="star">★</span></span>
            <span style="font-size:0.72rem;color:#555;">(${(film.vote_count||0).toLocaleString()} votes)</span>
          </div>
          <div class="film-desc">${escHtml(truncDesc)}</div>
          <div class="film-actions">
            <a href="https://www.themoviedb.org/movie/${film.id}" target="_blank" class="btn-view">View Details</a>
            <button class="btn-watchlist" onclick="addToWatchlist(this, '${escAttr(film.title)}')">Add to Watchlists</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderPagination(totalResults) {
  // Calculate total pages across TMDB pages
  const localTotal = filteredFilms.length;
  const localPages = Math.ceil(localTotal / perPage);
  const tmdbTotal = Math.min(totalResults, 250 * 20);
  const grandTotal = Math.min(totalResults, 5000);

  document.getElementById('page-title').textContent = `All Films (${grandTotal.toLocaleString()}+)`;

  const startItem = (currentTMDBPage - 1) * 20 + (currentPage - 1) * perPage + 1;
  const endItem = Math.min(startItem + perPage - 1, grandTotal);
  document.getElementById('pagination-info').textContent = `${startItem} - ${endItem} of ${grandTotal.toLocaleString()}`;

  const btns = document.getElementById('page-btns');
  btns.innerHTML = '';

  // Prev TMDB page
  const prevTMDB = document.createElement('button');
  prevTMDB.className = 'page-btn';
  prevTMDB.innerHTML = '&#171;';
  prevTMDB.title = 'Previous batch';
  prevTMDB.disabled = currentTMDBPage <= 1;
  prevTMDB.onclick = () => { currentTMDBPage--; currentPage = 1; loadFilms(); window.scrollTo(0,0); };
  btns.appendChild(prevTMDB);

  // Prev local page
  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.innerHTML = '&#8249;';
  prev.disabled = currentPage <= 1 && currentTMDBPage <= 1;
  prev.onclick = () => {
    if (currentPage > 1) { currentPage--; renderFilms(); renderPagination(totalResults); }
    else if (currentTMDBPage > 1) { currentTMDBPage--; currentPage = Math.ceil(20/perPage); loadFilms(); }
    window.scrollTo(0,0);
  };
  btns.appendChild(prev);

  // Page numbers
  for (let i = 1; i <= localPages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { currentPage = i; renderFilms(); renderPagination(totalResults); window.scrollTo(0,0); };
    btns.appendChild(btn);
  }

  // Next local page
  const next = document.createElement('button');
  next.className = 'page-btn';
  next.innerHTML = '&#8250;';
  next.disabled = currentPage >= localPages && currentTMDBPage >= totalTMDBPages;
  next.onclick = () => {
    if (currentPage < localPages) { currentPage++; renderFilms(); renderPagination(totalResults); }
    else if (currentTMDBPage < totalTMDBPages) { currentTMDBPage++; currentPage = 1; loadFilms(); }
    window.scrollTo(0,0);
  };
  btns.appendChild(next);

  // Next TMDB page
  const nextTMDB = document.createElement('button');
  nextTMDB.className = 'page-btn';
  nextTMDB.innerHTML = '&#187;';
  nextTMDB.title = 'Next batch';
  nextTMDB.disabled = currentTMDBPage >= totalTMDBPages;
  nextTMDB.onclick = () => { currentTMDBPage++; currentPage = 1; loadFilms(); window.scrollTo(0,0); };
  btns.appendChild(nextTMDB);
}

function showSkeleton() {
  document.getElementById('film-list').innerHTML = Array(5).fill(`
    <div class="skeleton-item">
      <div class="skeleton-poster"></div>
      <div class="skeleton-info">
        <div class="skeleton-line" style="width:55%;height:18px"></div>
        <div class="skeleton-line" style="width:40%;height:12px"></div>
        <div class="skeleton-line" style="width:20%;height:12px"></div>
        <div class="skeleton-line" style="width:90%;height:12px"></div>
        <div class="skeleton-line" style="width:80%;height:12px"></div>
        <div class="skeleton-line" style="width:35%;height:12px"></div>
      </div>
    </div>
  `).join('');
}

function toggleGenre() {
  document.getElementById('genre-menu').classList.toggle('open');
}

function filterGenre(id, name) {
  activeGenreId = id;
  currentTMDBPage = 1; currentPage = 1;
  document.getElementById('genre-menu').classList.remove('open');
  document.getElementById('genre-btn').innerHTML = `${name.toUpperCase()} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;
  document.getElementById('genre-btn').classList.toggle('active-filter', id !== 0);
  loadFilms();
}

function toggleSort() {
  sortDesc = !sortDesc;
  document.getElementById('sort-btn').innerHTML = `SORT BY TMDB ${sortDesc ? '↓' : '↑'} <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>`;
  currentTMDBPage = 1; currentPage = 1;
  if (!searchQuery) loadFilms();
}

function onSearch() {
  clearTimeout(searchTimer);
  searchQuery = document.getElementById('search-input').value;
  searchTimer = setTimeout(() => {
    currentTMDBPage = 1; currentPage = 1;
    loadFilms();
  }, 500);
}

function onPerPageChange() {
  perPage = parseInt(document.getElementById('per-page').value);
  currentPage = 1;
  renderFilms();
}

function addToWatchlist(btn, title) {
  btn.textContent = '✓ Added';
  btn.style.borderColor = 'var(--orange)';
  btn.style.color = 'var(--orange)';
  setTimeout(() => { btn.textContent = 'Add to Watchlists'; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g,"\\'");
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown-wrapper')) document.getElementById('genre-menu').classList.remove('open');
});

</script>
