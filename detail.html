<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieSpace — Film Detail</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="min-h-screen">

<!-- Navbar -->
<header class="navbar fixed top-0 left-0 right-0 z-50 backdrop-blur">
  <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 font-semibold no-underline" >
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4C13.3132 4 14.6136 4.25866 15.8268 4.7612C17.0401 5.26375 18.1425 6.0003 19.0711 6.9289C19.9997 7.8575 20.7362 8.9599 21.2388 10.1732C21.7413 11.3864 22 12.6868 22 14C22 16.6522 20.9464 19.1957 19.0711 21.0711C17.1957 22.9464 14.6522 24 12 24C10.6868 24 9.38642 23.7413 8.17317 23.2388C6.95991 22.7362 5.85752 21.9997 4.92893 21.0711C3.05357 19.1957 2 16.6522 2 14C2 11.3478 3.05357 8.8043 4.92893 6.9289C6.8043 5.05357 9.34784 4 12 4ZM12 6C11.337 6 10.7011 6.2634 10.2322 6.7322C9.76339 7.2011 9.5 7.837 9.5 8.5C9.5 9.163 9.76339 9.7989 10.2322 10.2678C10.7011 10.7366 11.337 11 12 11C12.663 11 13.2989 10.7366 13.7678 10.2678C14.2366 9.7989 14.5 9.163 14.5 8.5C14.5 7.837 14.2366 7.2011 13.7678 6.7322C13.2989 6.2634 12.663 6 12 6ZM12 12.5C11.6022 12.5 11.2206 12.658 10.9393 12.9393C10.658 13.2206 10.5 13.6022 10.5 14C10.5 14.3978 10.658 14.7794 10.9393 15.0607C11.2206 15.342 11.6022 15.5 12 15.5C12.3978 15.5 12.7794 15.342 13.0607 15.0607C13.342 14.7794 13.5 14.3978 13.5 14C13.5 13.6022 13.342 13.2206 13.0607 12.9393C12.7794 12.658 12.3978 12.5 12 12.5Z" fill="var(--accent)"/></svg>
      <span>MovieSpace</span>
    </a>
    <ul class="flex items-center gap-4 list-none m-0 p-0">
      <li><a href="films.html" class="nav-link text-sm no-underline">All Films</a></li>
      <li><a href="mylist.html" class="nav-link text-sm no-underline">My List</a></li>
      <li><a href="index.html" class="btn-nav text-sm no-underline">Login</a></li>
    </ul>
  </nav>
</header>

<!-- Detail Content -->
<main class="max-w-6xl mx-auto px-6 pt-20 pb-16" id="detail-container">

  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm mb-6">
    <a href="films.html" class="no-underline transition-colors">All Films</a>
    <span >/</span>
    <span id="breadcrumb-title" class="truncate max-w-xs" ></span>
  </div>

  <!-- Skeleton -->
  <div id="skeleton-detail">
    <div class="w-full rounded-2xl overflow-hidden">
      <div class="skeleton-line w-full rounded-2xl" ></div>
    </div>
    <div class="flex flex-col gap-3 mt-5">
      <div class="skeleton-line" ></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <!-- Film Detail (hidden until loaded) -->
  <div id="film-detail" class="hidden">
    <div class="flex flex-col md:flex-row gap-8 mt-4">
      <!-- Poster -->
      <div class="shrink-0">
        <img id="detail-poster" class="w-44 h-64 md:w-52 md:h-76 object-cover rounded-xl shadow-2xl"  src="" alt="" loading="lazy">
      </div>

      <!-- Info -->
      <div class="flex flex-col gap-3">
        <h1 id="detail-title" class="text-2xl md:text-3xl font-bold m-0" ></h1>

        <div class="flex flex-wrap items-center gap-2 text-sm">
          <span id="detail-year"></span>
          <span >·</span>
          <span id="detail-runtime"></span>
          <span >·</span>
          <span id="detail-language" class="text-xs px-2 py-0.5 rounded uppercase" ></span>
        </div>

        <!-- Genres -->
        <div id="detail-genres" class="flex flex-wrap gap-1.5"></div>

        <!-- Rating -->
        <div class="flex items-center gap-4 flex-wrap">
          <div class="flex items-center gap-1.5">
            <span class="tmdb-badge">IMDb</span>
            <span id="detail-rating" class="font-bold text-lg" ></span>
            <span id="detail-votes" class="text-xs" ></span>
          </div>
          <div id="detail-popularity" class="text-xs" ></div>
        </div>

        <!-- Tagline -->
        <p id="detail-tagline" class="text-sm italic m-0" ></p>

        <!-- Overview -->
        <p id="detail-overview" class="text-sm leading-relaxed m-0"></p>

        <!-- Action Buttons -->
        <div class="flex flex-wrap gap-3 mt-2">
          <a id="btn-tmdb" href="#" target="_blank" class="btn-primary inline-flex items-center gap-2 text-sm px-4 py-2 rounded-lg no-underline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6v2H5v11h11v-5h2v6a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1h6zm11-3v8l-3.528-3.535L9.828 15l-1.414-1.414 7.64-7.644L12 2h9z"/></svg>
            View on TMDB
          </a>
          <button id="btn-mylist" class="btn-ghost text-sm px-4 py-2 rounded-lg transition-colors cursor-pointer">Add to Watchlists</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Error State -->
  <div id="detail-error" class="hidden py-16 text-center" >
    <p class="text-lg mb-2">Film tidak ditemukan</p>
    <a href="films.html" class="text-sm no-underline" >← Back to All Films</a>
  </div>

</main>

<script type="module" src="./src/js/detail.js"></script>
</body>
</html>
