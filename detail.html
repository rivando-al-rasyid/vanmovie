<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieSpace — Film Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="shortcut icon" href="./src/asset/icon.ico" type="image/x-icon" />
    <script src="./src/js/header.js" defer></script>
    <script type="module" src="./src/js/auth.js"></script>
  </head>
  <body class="min-h-screen">

    <!-- Detail content -->
    <main class="max-w-6xl mx-auto px-6 pt-20 pb-16" id="detail-container">

      <!-- Breadcrumb -->
      <div class="flex items-center gap-2 text-sm mb-6">
        <a href="films.html" class="no-underline transition-colors">All Films</a>
        <span>/</span>
        <span id="breadcrumb-title" class="truncate max-w-xs"></span>
      </div>

      <!-- Film detail -->
      <div id="film-detail" class="hidden">
        <div class="flex flex-col md:flex-row gap-8 mt-4">

          <!-- Poster -->
          <div class="shrink-0">
            <img
              id="detail-poster"
              class="w-44 h-64 md:w-52 md:h-76 object-cover rounded-xl shadow-2xl"
              src="" alt="" loading="lazy"
            />
          </div>

          <!-- Info -->
          <div class="flex flex-col gap-3">
            <h1 id="detail-title" class="text-2xl md:text-3xl font-bold m-0"></h1>

            <div class="flex flex-wrap items-center gap-2 text-sm">
              <span id="detail-year"></span>
              <span>·</span>
              <span id="detail-runtime"></span>
              <span>·</span>
              <span id="detail-language" class="text-xs px-2 py-0.5 rounded uppercase"></span>
            </div>

            <!-- Genres -->
            <div id="detail-genres" class="flex flex-wrap gap-1.5"></div>

            <!-- Rating -->
            <div class="flex items-center gap-4 flex-wrap">
              <div class="flex items-center gap-1.5">
                <span class="tmdb-badge">IMDb</span>
                <span id="detail-rating" class="font-bold text-lg"></span>
                <span id="detail-votes" class="text-xs"></span>
              </div>
              <div id="detail-popularity" class="text-xs"></div>
            </div>

            <!-- Tagline -->
            <p id="detail-tagline" class="text-sm italic m-0"></p>

            <!-- Overview -->
            <p id="detail-overview" class="text-sm leading-relaxed m-0"></p>

            <!-- Action buttons -->
            <div class="flex flex-wrap gap-3 mt-2">
              <a
                id="btn-tmdb"
                href="#"
                target="_blank"
                class="btn-primary inline-flex items-center gap-2 text-sm px-4 py-2 rounded-lg no-underline"
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M10 6v2H5v11h11v-5h2v6a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1h6zm11-3v8l-3.528-3.535L9.828 15l-1.414-1.414 7.64-7.644L12 2h9z"/>
                </svg>
                View on TMDB
              </a>
              <button
                id="btn-mylist"
                class="btn-watchlist text-sm px-4 py-2 rounded-lg transition-colors cursor-pointer bg-transparent"
              >
                Add to Watchlist
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Error state -->
      <div id="detail-error" class="hidden py-16 text-center">
        <p class="text-lg mb-2">Film tidak ditemukan</p>
        <a href="films.html" class="text-sm no-underline">← Back to All Films</a>
      </div>
    </main>

    <script type="module" src="./src/js/movies.js"></script>
  </body>
</html>
